name: Deploy production via SSH

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  verify:
    name: Verify release
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy approved commit
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    steps:
      - name: Validate deployment configuration
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          REPO_PATH: ${{ vars.REPO_PATH }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          PHP_BIN: ${{ vars.PHP_BIN }}
          COMPOSER_BIN: ${{ vars.COMPOSER_BIN }}
        run: |
          set -Eeuo pipefail
          : "${SSH_HOST:?Missing SSH_HOST secret}"
          : "${SSH_USER:?Missing SSH_USER secret}"
          : "${SSH_PORT:?Missing SSH_PORT secret}"
          : "${REPO_PATH:?Missing REPO_PATH variable}"
          : "${DEPLOY_PATH:?Missing DEPLOY_PATH variable}"
          [[ "$SSH_PORT" =~ ^[0-9]{1,5}$ ]]
          [[ "$SSH_USER" =~ ^[A-Za-z0-9._-]+$ ]]
          [[ "$REPO_PATH" =~ ^/[A-Za-z0-9._/-]+$ ]]
          [[ "$DEPLOY_PATH" =~ ^/[A-Za-z0-9._/-]+$ ]]
          [[ "${PHP_BIN:-php}" =~ ^[A-Za-z0-9._/-]+$ ]]
          [[ "${COMPOSER_BIN:-composer}" =~ ^[A-Za-z0-9._/-]+$ ]]
          test "$REPO_PATH" != "/"
          test "$DEPLOY_PATH" != "/"
          test "$REPO_PATH" != "$DEPLOY_PATH"

      - name: Configure SSH trust
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          set -Eeuo pipefail
          : "${SSH_KEY:?Missing SSH_KEY secret}"
          : "${SSH_KNOWN_HOSTS:?Missing SSH_KNOWN_HOSTS secret}"
          install -d -m 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/deploy_key ~/.ssh/known_hosts

      - name: Deploy immutable commit
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          REPO_PATH: ${{ vars.REPO_PATH }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          PHP_BIN: ${{ vars.PHP_BIN }}
          COMPOSER_BIN: ${{ vars.COMPOSER_BIN }}
          REPOSITORY: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -Eeuo pipefail
          PHP_BIN="${PHP_BIN:-php}"
          COMPOSER_BIN="${COMPOSER_BIN:-composer}"
          ssh -i ~/.ssh/deploy_key \
            -p "$SSH_PORT" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "$SSH_USER@$SSH_HOST" \
            "REPO_PATH='$REPO_PATH' DEPLOY_PATH='$DEPLOY_PATH' PHP_BIN='$PHP_BIN' COMPOSER_BIN='$COMPOSER_BIN' REPOSITORY='$REPOSITORY' COMMIT_SHA='$COMMIT_SHA' bash -s" <<'REMOTE'
          set -Eeuo pipefail
          umask 027

          command -v git >/dev/null
          command -v rsync >/dev/null
          command -v "$PHP_BIN" >/dev/null
          command -v "$COMPOSER_BIN" >/dev/null

          if [ -d "$REPO_PATH/.git" ]; then
            git -C "$REPO_PATH" remote set-url origin "https://github.com/$REPOSITORY.git"
            git -C "$REPO_PATH" fetch --force --prune origin "$COMMIT_SHA"
          else
            install -d -m 750 "$(dirname "$REPO_PATH")"
            git clone --no-checkout "https://github.com/$REPOSITORY.git" "$REPO_PATH"
            git -C "$REPO_PATH" fetch --force origin "$COMMIT_SHA"
          fi

          git -C "$REPO_PATH" checkout --detach --force "$COMMIT_SHA"
          test "$(git -C "$REPO_PATH" rev-parse HEAD)" = "$COMMIT_SHA"
          "$COMPOSER_BIN" --working-dir="$REPO_PATH" install \
            --no-dev --no-interaction --prefer-dist --no-progress --no-scripts \
            --classmap-authoritative

          test -f "$DEPLOY_PATH/.env" || { echo 'Production .env is required.' >&2; exit 1; }
          grep -Eq '^APP_ENV=production$' "$DEPLOY_PATH/.env" || { echo 'APP_ENV must be production.' >&2; exit 1; }
          grep -Eq '^APP_DEBUG=false$' "$DEPLOY_PATH/.env" || { echo 'APP_DEBUG must be false.' >&2; exit 1; }
          grep -Eq '^APP_KEY=base64:.+' "$DEPLOY_PATH/.env" || { echo 'A persistent APP_KEY is required.' >&2; exit 1; }

          cd "$DEPLOY_PATH"
          "$PHP_BIN" artisan down --retry=60 --refresh=15 || true
          trap '"$PHP_BIN" artisan up || true' EXIT

          rsync -a --delete \
            --exclude='.git/' \
            --exclude='.env' \
            --exclude='storage/' \
            --exclude='public/storage' \
            --exclude='public/.well-known/' \
            "$REPO_PATH/" "$DEPLOY_PATH/"

          install -d -m 770 storage/framework/{cache,sessions,views} storage/logs bootstrap/cache
          "$COMPOSER_BIN" dump-autoload --no-dev --classmap-authoritative --no-interaction
          "$PHP_BIN" artisan migrate --force
          "$PHP_BIN" artisan optimize:clear
          "$PHP_BIN" artisan config:cache
          "$PHP_BIN" artisan route:cache
          "$PHP_BIN" artisan view:cache
          "$PHP_BIN" artisan queue:restart
          "$PHP_BIN" artisan up
          trap - EXIT
          REMOTE

      - name: Remove ephemeral SSH material
        if: always()
        run: rm -f ~/.ssh/deploy_key ~/.ssh/known_hosts

