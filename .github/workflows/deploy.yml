name: Deploy production via SSH

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy directly to production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    steps:
      - name: Validate deployment configuration
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH || secrets.DEPLOY_PATH }}
          PHP_BIN: ${{ vars.PHP_BIN || secrets.PHP_BIN }}
          COMPOSER_BIN: ${{ vars.COMPOSER_BIN || secrets.COMPOSER_BIN }}
        run: |
          set -Eeuo pipefail
          : "${SSH_HOST:?Missing SSH_HOST secret}"
          : "${SSH_USER:?Missing SSH_USER secret}"
          : "${SSH_PORT:?Missing SSH_PORT secret}"
          : "${DEPLOY_PATH:?Missing DEPLOY_PATH variable}"
          [[ "$SSH_PORT" =~ ^[0-9]{1,5}$ ]]
          [[ "$SSH_USER" =~ ^[A-Za-z0-9._-]+$ ]]
          [[ "$DEPLOY_PATH" =~ ^/[A-Za-z0-9._/-]+$ ]]
          [[ "${PHP_BIN:-php}" =~ ^[A-Za-z0-9._/-]+$ ]]
          [[ "${COMPOSER_BIN:-composer}" =~ ^[A-Za-z0-9._/-]+$ ]]
          test "$DEPLOY_PATH" != "/"

      - name: Configure SSH trust
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          set -Eeuo pipefail
          : "${SSH_KEY:?Missing SSH_KEY secret}"
          : "${SSH_KNOWN_HOSTS:?Missing SSH_KNOWN_HOSTS secret}"
          install -d -m 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/deploy_key ~/.ssh/known_hosts

      - name: Pull and deploy main
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH || secrets.DEPLOY_PATH }}
          PHP_BIN: ${{ vars.PHP_BIN || secrets.PHP_BIN }}
          COMPOSER_BIN: ${{ vars.COMPOSER_BIN || secrets.COMPOSER_BIN }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -Eeuo pipefail
          PHP_BIN="${PHP_BIN:-php}"
          COMPOSER_BIN="${COMPOSER_BIN:-composer}"
          ssh -i ~/.ssh/deploy_key \
            -p "$SSH_PORT" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "$SSH_USER@$SSH_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' PHP_BIN='$PHP_BIN' COMPOSER_BIN='$COMPOSER_BIN' REPOSITORY='$REPOSITORY' bash -s" <<'REMOTE'
          set -Eeuo pipefail
          umask 027

          command -v git >/dev/null
          command -v "$PHP_BIN" >/dev/null
          command -v "$COMPOSER_BIN" >/dev/null

          install -d -m 750 "$DEPLOY_PATH"
          cd "$DEPLOY_PATH"

          if [ -f artisan ]; then
            "$PHP_BIN" artisan down --retry=60 --refresh=15 || true
          fi
          trap 'if [ -f artisan ]; then "$PHP_BIN" artisan up || true; fi' EXIT

          if [ -d .git ]; then
            git remote set-url origin "https://github.com/$REPOSITORY.git"
            git checkout main
            git pull --ff-only origin main
          else
            git init
            git remote add origin "https://github.com/$REPOSITORY.git"
            git fetch --prune origin main
            git checkout --force -B main origin/main
          fi

          test -f .env || { echo 'Production .env is required.' >&2; exit 1; }
          grep -Eq '^APP_ENV=production$' .env || { echo 'APP_ENV must be production.' >&2; exit 1; }
          grep -Eq '^APP_DEBUG=false$' .env || { echo 'APP_DEBUG must be false.' >&2; exit 1; }
          grep -Eq '^APP_KEY=base64:.+' .env || { echo 'A persistent APP_KEY is required.' >&2; exit 1; }

          install -d -m 770 storage/framework/{cache,sessions,views} storage/logs bootstrap/cache
          "$COMPOSER_BIN" install --no-dev --no-interaction --prefer-dist --no-progress --classmap-authoritative
          "$PHP_BIN" artisan migrate --force
          "$PHP_BIN" artisan optimize:clear
          "$PHP_BIN" artisan config:cache
          "$PHP_BIN" artisan route:cache
          "$PHP_BIN" artisan view:cache
          "$PHP_BIN" artisan queue:restart
          "$PHP_BIN" artisan up
          trap - EXIT
          REMOTE

      - name: Remove ephemeral SSH material
        if: always()
        run: rm -f ~/.ssh/deploy_key ~/.ssh/known_hosts
