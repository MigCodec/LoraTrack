name: Documentation package

on:
  workflow_dispatch:
    inputs:
      version:
        description: Documentation version label
        required: false
        default: ''
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'tools/build_docs_pdf.py'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'tools/build_docs_pdf.py'
      - '.github/workflows/docs.yml'

permissions:
  contents: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-docs:
    name: Build versioned PDF documentation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: '3.12'

      - name: Install documentation renderer
        run: |
          python -m pip install --upgrade pip
          python -m pip install markdown playwright
          python -m playwright install --with-deps chromium

      - name: Build public documentation
        run: |
          python tools/build_docs_pdf.py \
            --version "${{ github.event.inputs.version || '1.0' }}" \
            --engine playwright

      - name: Verify public documents
        run: |
          test -s docs/LoraTrack-Technical-Documentation.pdf
          test -s docs/LoraTrack-Deployment-Guide.pdf
          ! grep -R -E "Source commit|Source branch|git_commit|git_branch|Local repository|GITHUB_SHA" \
            docs/LoraTrack-Technical-Documentation.* docs/LoraTrack-Deployment-Guide.*

      - name: Publish generated documents to the repository
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        shell: bash
        run: |
          set -Eeuo pipefail
          if git diff --quiet -- docs/LoraTrack-Technical-Documentation.* docs/LoraTrack-Deployment-Guide.*; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/LoraTrack-Technical-Documentation.* docs/LoraTrack-Deployment-Guide.*
          git commit -m "docs: update public documentation [skip ci]"
          git push origin HEAD:main
