version: 2
updates:
  - package-ecosystem: composer
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '08:00'
      timezone: America/Santiago
    open-pull-requests-limit: 5
    groups:
      php-dependencies:
        patterns: ['*']

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '08:30'
      timezone: America/Santiago
    open-pull-requests-limit: 5

